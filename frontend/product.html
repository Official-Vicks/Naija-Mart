<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Shop — Naijamart</title>
    <meta
      name="description"
      content="Browse trending products from Nigerian sellers. Buy directly via WhatsApp."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="shortcut icon"
      href="assets/icons/logo_icon.png"
      type="image/png"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-slate-50">
    <div id="navbar"></div>

    <!-- Listing -->
    <section id="listView" class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
      <div
        class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-6"
      >
        <div>
          <h1 class="font-display text-3xl font-bold">Marketplace</h1>
          <p class="text-slate-500 mt-1">
            Discover quality products from verified sellers.
          </p>
        </div>
        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
          <div class="relative flex-1 min-w-[260px]">
            <svg
              class="absolute left-3 top-1/2 -translate-y-1/2"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#94a3b8"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="7" />
              <path d="M21 21l-4.3-4.3" />
            </svg>
            <input
              id="search"
              class="input pl-10"
              placeholder="Search products..."
            />
          </div>
          <select id="catFilter" class="input sm:w-48"></select>
        </div>
      </div>
      <div
        id="grid"
        class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6"
      ></div>
      <div
        id="pagination"
        class="flex justify-center items-center gap-2 mt-10"
      ></div>
    </section>

    <!-- Detail -->
    <section
      id="detailView"
      class="max-w-6xl mx-auto px-4 sm:px-6 py-10 hidden"
    >
      <a
        href="product.html"
        class="text-sm text-emerald-700 font-semibold hover:underline"
        >← Back to shop</a
      >
      <div id="detail" class="mt-4"></div>
      <div class="mt-14">
        <h3 class="font-display text-xl font-bold mb-4">Related products</h3>
        <div
          id="related"
          class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6"
        ></div>
      </div>
    </section>

    <div id="footer"></div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/products.js"></script>
    <script>
      UI.mountNavbar("shop");
      document.getElementById("footer").innerHTML = UI.footer();

      const params = new URLSearchParams(location.search);
      const productId = params.get("id");

      if (productId) {
        document.getElementById("listView").classList.add("hidden");
        document.getElementById("detailView").classList.remove("hidden");
        renderDetail(productId);
      } else {
        initListing();
      }

      async function initListing() {
        const grid = document.getElementById("grid");
        const search = document.getElementById("search");
        const catFilter = document.getElementById("catFilter");
        grid.innerHTML = Products.skeletons(8);
        const list = await Products.fetchAll();
        catFilter.innerHTML = Products.uniqueCategories(list)
          .map((c) => `<option>${c}</option>`)
          .join("");

        const PER = 8;
        let page = 1;

        function render() {
          const filtered = Products.applyFilters(list, {
            q: search.value,
            category: catFilter.value,
          });
          if (!filtered.length) {
            grid.innerHTML = Products.emptyState();
            document.getElementById("pagination").innerHTML = "";
            return;
          }
          const pages = Math.ceil(filtered.length / PER);
          if (page > pages) page = 1;
          const slice = filtered.slice((page - 1) * PER, page * PER);
          grid.innerHTML = slice.map(Products.card).join("");
          renderPagination(pages);
        }

        function renderPagination(pages) {
          const host = document.getElementById("pagination");
          if (pages <= 1) {
            host.innerHTML = "";
            return;
          }
          let html = `<button class="btn-ghost text-xs" ${
            page === 1 ? "disabled" : ""
          } data-p="prev">Prev</button>`;
          for (let i = 1; i <= pages; i++)
            html += `<button class="px-3 py-1.5 rounded-lg text-sm font-semibold ${
              i === page
                ? "bg-emerald-600 text-white"
                : "bg-white border border-slate-200"
            }" data-p="${i}">${i}</button>`;
          html += `<button class="btn-ghost text-xs" ${
            page === pages ? "disabled" : ""
          } data-p="next">Next</button>`;
          host.innerHTML = html;
          host.querySelectorAll("button[data-p]").forEach((b) =>
            b.addEventListener("click", () => {
              const v = b.dataset.p;
              if (v === "prev") page = Math.max(1, page - 1);
              else if (v === "next") page = Math.min(pages, page + 1);
              else page = +v;
              render();
            })
          );
        }

        search.addEventListener("input", () => {
          page = 1;
          render();
        });
        catFilter.addEventListener("change", () => {
          page = 1;
          render();
        });
        render();
      }

      async function renderDetail(id) {
        const list = await Products.fetchAll();
        const p = list.find((x) => x.id === id);
        const host = document.getElementById("detail");
        if (!p) {
          host.innerHTML = Products.emptyState("Product not found");
          return;
        }
        const inStock = p.stock > 0;
        const img = p.images?.[0] || "https://placehold.co/800x800";
        host.innerHTML = `
    <div class="grid lg:grid-cols-2 gap-8">
      <div class="card p-3">
        <img src="${img}" alt="${
          p.name
        }" class="w-full aspect-square object-cover rounded-xl bg-slate-100">
        ${
          p.images?.length > 1
            ? `<div class="grid grid-cols-4 gap-2 mt-3">${p.images
                .map(
                  (s) =>
                    `<img src="${s}" class="aspect-square object-cover rounded-lg border border-slate-200">`
                )
                .join("")}</div>`
            : ""
        }
      </div>
      <div>
        <span class="badge badge-soft">${p.category}</span>
        <h1 class="font-display text-3xl font-bold mt-3">${p.name}</h1>
        <p class="font-display text-3xl font-bold text-emerald-700 mt-3">${UI.formatNaira(
          p.price
        )}</p>
        <p class="text-sm mt-1"><span class="badge ${
          inStock ? "badge-success" : "badge-danger"
        }">${inStock ? `${p.stock} in stock` : "Sold out"}</span></p>
        <p class="text-slate-600 mt-5 leading-relaxed">${p.description}</p>

        <div class="card p-4 mt-6 flex items-center gap-3">
          <div class="w-11 h-11 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-semibold">${
            (p.seller?.name || "S")[0]
          }</div>
          <div class="flex-1"><p class="font-semibold">${
            p.seller?.name || "Naijamart Seller"
          }</p><p class="text-xs text-slate-500">Verified seller · Responds in minutes</p></div>
        </div>

        <div class="mt-6 flex items-center gap-3">
          <div class="flex items-center border border-slate-200 rounded-xl overflow-hidden">
            <button id="qMinus" class="px-3 py-2 hover:bg-slate-50">−</button>
            <input id="qty" value="1" class="w-12 text-center py-2 outline-none"/>
            <button id="qPlus" class="px-3 py-2 hover:bg-slate-50">+</button>
          </div>
          <a id="waBtn" href="#" target="_blank" class="btn-wa flex-1 justify-center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.82 11.82 0 0 1 3.48 8.414c-.003 6.554-5.338 11.89-11.893 11.89a11.9 11.9 0 0 1-5.688-1.448L.057 24z"/></svg>
            Buy on WhatsApp
          </a>
        </div>
      </div>
    </div>`;

        const qty = host.querySelector("#qty");
        const updateWa = () =>
          (host.querySelector("#waBtn").href = UI.whatsappUrl(
            p.seller?.phone,
            `${qty.value} × ${p.name}`
          ));
        host.querySelector("#qMinus").onclick = () => {
          qty.value = Math.max(1, +qty.value - 1);
          updateWa();
        };
        host.querySelector("#qPlus").onclick = () => {
          qty.value = Math.min(p.stock || 99, +qty.value + 1);
          updateWa();
        };
        qty.oninput = updateWa;
        updateWa();

        const related = list
          .filter((x) => x.category === p.category && x.id !== p.id)
          .slice(0, 4);
        document.getElementById("related").innerHTML = related.length
          ? related.map(Products.card).join("")
          : Products.emptyState("No related products");
      }
    </script>
  </body>
</html>
