<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign in — Naijamart</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="min-h-screen hero-grad">
<div id="navbar"></div>
<main class="max-w-md mx-auto px-4 py-14">
  <div class="card p-7 sm:p-8">
    <a href="index.html" class="flex items-center gap-2 mb-6">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-700 text-white flex items-center justify-center font-bold">N</div>
      <span class="font-display text-lg font-bold">Naijamart</span>
    </a>
    <h1 class="font-display text-2xl font-bold">Welcome back</h1>
    <p class="text-slate-500 mt-1 text-sm">Sign in to manage your store and orders.</p>
    <form id="loginForm" class="mt-6 space-y-4">
      <div>
        <label class="text-sm font-medium">Email</label>
        <input name="email" type="email" class="input mt-1" placeholder="you@example.com" required>
      </div>
      <div>
        <div class="flex justify-between items-center"><label class="text-sm font-medium">Password</label><a href="#" class="text-xs text-emerald-700 hover:underline">Forgot?</a></div>
        <input name="password" type="password" class="input mt-1" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary w-full justify-center flex items-center">Sign in</button>
    </form>
    <p class="text-sm text-slate-500 mt-6 text-center">New to Naijamart? <a href="register.html" class="text-emerald-700 font-semibold">Create an account</a></p>
  </div>
</main>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script>UI.mountNavbar(); Auth.bindLogin("loginForm");</script>
</body>
</html>
